<!DOCTYPE html>
<html>
<head>
<title>Permanent Molar Comparison</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body{
background:linear-gradient(180deg,#020617,#000000);
font-family:'Segoe UI', Arial, sans-serif;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.corner{
position:fixed;
top:15px;
right:20px;
text-align:right;
font-size:14px;
color:#9ca3af;
}

h1{
margin-top:20px;
font-size:36px;
color:#f3f4f6;
}

.subtitle{
color:#9ca3af;
font-style:italic;
margin-bottom:30px;
font-size:18px;
}

.container{
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.viewer{
width:420px;
margin-bottom:30px;
}

.model-wrapper{
width:420px;
height:420px;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 25px rgba(0,0,0,0.6);
background:rgba(31,41,55,0.9);
}

.upright model-viewer{
transform:rotateX(180deg);
}

model-viewer{
width:100%;
height:100%;
background:transparent;
}

select{
width:340px;
padding:12px;
margin-bottom:15px;
font-size:16px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
}

.info{
margin-top:15px;
background:rgba(31,41,55,0.9);
padding:20px;
border-radius:12px;
min-height:220px;
text-align:left;
}

.collapsible{
background-color:#111827;
color:white;
cursor:pointer;
padding:10px;
width:100%;
border:none;
text-align:left;
font-size:15px;
border-radius:6px;
margin-top:8px;
font-weight:bold;
}

.content{
max-height:0;
overflow:hidden;
padding:0 15px;
background-color:#1f2937;
border-radius:6px;
transition:max-height 0.35s ease;
}

.chronology{color:#3b82f6;}
.general{color:#a78bfa;}
.cusps{color:#f59e0b;}
.elevations{color:#10b981;}
.contact{color:#f472b6;}
.clinical{color:#ef4444;}
</style>
</head>

<body>

<div class="corner">
Abdelrahman Khaled<br>
265187
</div>

<h1>Permanent Molar Comparison</h1>
<div class="subtitle">Interactive 3D Dental Comparison Tool</div>

<div class="container">

<div class="viewer">
<select onchange="loadTooth(this.value,'viewerA','infoA')">
<option>Select Tooth A</option>
<option value="maxillary_first_molar.glb">Maxillary First Molar</option>
<option value="maxillary_second_molar.glb">Maxillary Second Molar</option>
<option value="maxillary_third_molar.glb">Maxillary Third Molar</option>
<option value="mandibular_first_molar.glb">Mandibular First Molar</option>
<option value="mandibular_second_molar.glb">Mandibular Second Molar</option>
<option value="mandibular_third_molar.glb">Mandibular Third Molar</option>
<option value="maxillary_first_molar_with_cusp_of_carabelli.glb">Maxillary First Molar (Carabelli)</option>
<option value="maxillary_first_molar_with_two_root_canals.glb">Maxillary First Molar (Two Root Canals)</option>
</select>
<div id="wrapperA" class="model-wrapper">
<model-viewer id="viewerA" camera-controls auto-rotate></model-viewer>
</div>
<div id="infoA" class="info">Select a molar</div>
</div>

<div class="viewer">
<select onchange="loadTooth(this.value,'viewerB','infoB')">
<option>Select Tooth B</option>
<option value="maxillary_first_molar.glb">Maxillary First Molar</option>
<option value="maxillary_second_molar.glb">Maxillary Second Molar</option>
<option value="maxillary_third_molar.glb">Maxillary Third Molar</option>
<option value="mandibular_first_molar.glb">Mandibular First Molar</option>
<option value="mandibular_second_molar.glb">Mandibular Second Molar</option>
<option value="mandibular_third_molar.glb">Mandibular Third Molar</option>
<option value="maxillary_first_molar_with_cusp_of_carabelli.glb">Maxillary First Molar (Carabelli)</option>
<option value="maxillary_first_molar_with_two_root_canals.glb">Maxillary First Molar (Two Root Canals)</option>
</select>
<div id="wrapperB" class="model-wrapper">
<model-viewer id="viewerB" camera-controls auto-rotate></model-viewer>
</div>
<div id="infoB" class="info">Select a molar</div>
</div>

</div>

<script>

const upsideDown=[
"maxillary_first_molar.glb",
"maxillary_second_molar.glb",
"maxillary_third_molar.glb",
"maxillary_first_molar_with_cusp_of_carabelli.glb",
"maxillary_first_molar_with_two_root_canals.glb"
];


const toothInfo={

/* MAXILLARY FIRST MOLAR */
"maxillary_first_molar.glb":{
"General Features":"Largest maxillary molar. Crown outline rhomboidal. Three roots: mesio buccal root, disto buccal root, and palatal root. Roots widely divergent providing strong anchorage.",
"Chronology":"Calcification begins at 4 months in utero. Eruption occurs at 6 to 7 years. Root completion at 9 to 10 years.",
"Cusps":"Four major cusps: mesio buccal cusp, disto buccal cusp, mesio lingual cusp, and disto lingual cusp. The mesio lingual cusp is the largest and tallest.",
"Elevations & Depressions":"Prominent oblique ridge connecting mesio lingual cusp to disto buccal cusp. Central fossa, distal fossa, and triangular fossae present. Central developmental groove, buccal groove, and disto lingual groove visible.",
"Contact Areas":"Mesial contact located at the junction of occlusal and middle third. Distal contact located in the middle third and slightly more cervical than mesial contact."
},

/* MAXILLARY SECOND MOLAR */
"maxillary_second_molar.glb":{
"General Features":"Smaller than maxillary first molar. Crown outline rhomboidal or heart shaped due to reduction of disto lingual portion. Three roots present but less divergent and closer together.",
"Chronology":"Eruption occurs at 12 to 13 years. Root completion at 14 to 16 years.",
"Cusps":"Four cusps: mesio buccal cusp, disto buccal cusp, mesio lingual cusp, and disto lingual cusp. The disto lingual cusp is commonly reduced in size.",
"Elevations & Depressions":"Oblique ridge present but less prominent than first molar. Central fossa and distal fossa present. Shorter central developmental groove.",
"Contact Areas":"Mesial contact located in the middle third. Distal contact also located in the middle third and positioned slightly more cervical."
},

/* MAXILLARY THIRD MOLAR */
"maxillary_third_molar.glb":{
"General Features":"Most variable tooth in the oral cavity in crown shape, cusp number, and root morphology. Roots commonly fused and may be curved distally.",
"Chronology":"Eruption occurs between 17 and 21 years. Root completion between 18 and 25 years.",
"Cusps":"Commonly three cusps: mesio buccal cusp, disto buccal cusp, and mesio lingual cusp. A disto lingual cusp may be absent.",
"Elevations & Depressions":"Irregular occlusal anatomy. Central fossa shallow. Developmental grooves wrinkled and inconsistent.",
"Contact Areas":"Mesial contact located in middle third. Distal contact often small or poorly defined due to anatomical variation."
},

/* MANDIBULAR FIRST MOLAR */
"mandibular_first_molar.glb":{
"General Features":"Largest mandibular molar. Crown outline pentagonal. Two roots: mesial root and distal root. Mesial root broader bucco lingually.",
"Chronology":"Eruption occurs at 6 to 7 years. Root completion at 9 to 10 years.",
"Cusps":"Five cusps: mesio buccal cusp, disto buccal cusp, distal cusp, mesio lingual cusp, and disto lingual cusp.",
"Elevations & Depressions":"Y shaped groove pattern formed by central groove, mesiobuccal groove, and distobuccal groove. Central fossa and two triangular fossae present.",
"Contact Areas":"Mesial contact located at junction of occlusal and middle third. Distal contact located in middle third."
},

/* MANDIBULAR SECOND MOLAR */
"mandibular_second_molar.glb":{
"General Features":"Crown outline rectangular. Two roots present, less divergent than first molar.",
"Chronology":"Eruption occurs at 11 to 13 years. Root completion at 14 to 15 years.",
"Cusps":"Four cusps: mesio buccal cusp, disto buccal cusp, mesio lingual cusp, and disto lingual cusp. Cusps nearly equal in size.",
"Elevations & Depressions":"Cross shaped groove pattern formed by central groove and buccal and lingual grooves. Central fossa present.",
"Contact Areas":"Mesial and distal contacts located in middle third of crown."
},

/* MANDIBULAR THIRD MOLAR */
"mandibular_third_molar.glb":{
"General Features":"Most variable tooth in the oral cavity in both crown form and root morphology. Roots often fused and irregular.",
"Chronology":"Eruption occurs between 17 and 21 years. Root completion between 18 and 25 years.",
"Cusps":"Usually four or five cusps including mesio buccal cusp, disto buccal cusp, distal cusp, mesio lingual cusp, and disto lingual cusp depending on variation.",
"Elevations & Depressions":"Irregular occlusal surface with wrinkled grooves and shallow fossae.",
"Contact Areas":"Contact areas variable and often reduced in size."
},

/* MAXILLARY FIRST MOLAR WITH CUSP OF CARABELLI */
"maxillary_first_molar_with_cusp_of_carabelli.glb":{
"General Features":"Maxillary first molar with additional anatomical variation on mesio lingual cusp. Crown outline rhomboidal. Three roots: mesio buccal root, disto buccal root, and palatal root.",
"Chronology":"Calcification begins at 4 months in utero. Eruption at 6 to 7 years. Root completion at 9 to 10 years.",
"Cusps":"Five cusps: mesio buccal cusp, disto buccal cusp, mesio lingual cusp, disto lingual cusp, and cusp of Carabelli located on lingual surface of mesio lingual cusp.",
"Elevations & Depressions":"Oblique ridge connects mesio lingual cusp and disto buccal cusp. Developmental groove may extend from cusp of Carabelli toward lingual surface.",
"Contact Areas":"Mesial contact at junction of occlusal and middle third. Distal contact located in middle third slightly more cervical.",
"Clinical Significance":"The groove associated with cusp of Carabelli may predispose to plaque retention and dental caries. It is important in restorative dentistry for accurate crown morphology reproduction."
},

/* MAXILLARY FIRST MOLAR WITH TWO ROOT CANALS */
"maxillary_first_molar_with_two_root_canals.glb":{
"General Features":"Maxillary first molar with common variation of two canals within mesio buccal root. Three roots present: mesio buccal root, disto buccal root, and palatal root.",
"Chronology":"Calcification begins at 4 months in utero. Eruption at 6 to 7 years. Root completion at 9 to 10 years.",
"Cusps":"Four major cusps: mesio buccal cusp, disto buccal cusp, mesio lingual cusp, and disto lingual cusp.",
"Elevations & Depressions":"Prominent oblique ridge. Central fossa and distal fossa present. Central developmental groove well defined.",
"Contact Areas":"Mesial contact at junction of occlusal and middle third. Distal contact located in middle third slightly more cervical.",
"Clinical Significance":"Presence of second canal in mesio buccal root is highly significant in endodontic treatment. Failure to detect and treat this canal is a common cause of root canal therapy failure."
}

};


function loadTooth(file,viewerId,infoId){
const wrapper=document.getElementById('wrapper'+viewerId.slice(-1));
const mv=document.getElementById(viewerId);
mv.src=file;

if(upsideDown.includes(file))
wrapper.classList.add("upright");
else
wrapper.classList.remove("upright");

const info=toothInfo[file];
const container=document.getElementById(infoId);

let html="";
for(const section in info){
let cls="";
if(section==="Chronology") cls="chronology";
if(section==="General Features") cls="general";
if(section==="Cusps") cls="cusps";
if(section==="Elevations & Depressions") cls="elevations";
if(section==="Contact Areas") cls="contact";
if(section==="Clinical Significance") cls="clinical";

html+=`<button class="collapsible ${cls}">${section}</button>
<div class="content">${info[section]}</div>`;
}

container.innerHTML=html;

const coll=container.querySelectorAll(".collapsible");
coll.forEach(btn=>{
btn.onclick=function(){
coll.forEach(b=>{
if(b!==this)
b.nextElementSibling.style.maxHeight=null;
});
const content=this.nextElementSibling;
content.style.maxHeight=content.style.maxHeight?null:content.scrollHeight+"px";
}
});
}

</script>
</body>
</html>
